<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥖 빵 추가 알림 디스플레이</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6f9;
    --surface: #ffffff;
    --surface2: #edf0f5;
    --border: #ced4de;
    --accent: #c97d10;
    --accent-bg: #fff4e0;
    --accent-dark: #9a5e08;
    --blue: #1a5fb0;
    --blue-bg: #e8f0fc;
    --blue-border: #bad0f5;
    --green: #1a7a42;
    --green-bg: #e6f7ee;
    --green-border: #a8dfbc;
    --red: #c0392b;
    --text: #0d1117;
    --text-mid: #2c3a50;
    --text-dim: #6a7a92;
    --shadow-sm: 0 2px 6px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 18px rgba(0,0,0,0.11);
    --shadow-lg: 0 8px 36px rgba(0,0,0,0.15);
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-size: 17px;
  }

  /* ── Config ── */
  .cfg-wrap { max-width:960px; margin:0 auto; width:100%; padding:0 20px; }
  .cfg-panel {
    background:#fffbf0; border:1.5px solid #e8c060;
    border-radius:var(--radius-sm); padding:14px 18px;
    font-size:0.78rem; color:#7a5a10; line-height:1.9; margin:14px 0 0;
  }
  .cfg-panel summary {
    font-weight:700; cursor:pointer; color:var(--accent-dark);
    font-size:0.82rem; list-style:none; display:flex; align-items:center; gap:8px;
  }
  .cfg-panel summary::before { content:'⚙️'; }
  .cfg-fields { margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; }
  .cfg-fields input {
    flex:1; min-width:220px; padding:9px 12px;
    border:1.5px solid #e0c070; border-radius:8px;
    font-family:monospace; font-size:0.8rem; color:var(--text); background:#fff;
  }
  .cfg-fields input:focus { outline:none; border-color:var(--accent); }
  .btn-cfg {
    padding:9px 20px; background:var(--accent); border:none; border-radius:8px;
    color:#fff; font-weight:800; font-size:0.82rem; cursor:pointer; transition:background 0.15s;
  }
  .btn-cfg:hover { background:var(--accent-dark); }
  .cfg-st { font-size:0.78rem; margin-top:5px; width:100%; }
  .cfg-st.ok { color:var(--green); font-weight:700; }
  .cfg-st.err { color:var(--red); }

  /* ── Auto del ── */
  .auto-del-bar {
    background:var(--green-bg); border-bottom:2px solid var(--green-border);
    padding:9px 22px; font-size:0.82rem; color:var(--green);
    font-weight:700; display:none; align-items:center; gap:8px;
  }
  .auto-del-bar.show { display:flex; }

  /* ── Top Bar ── */
  .topbar {
    background:var(--surface); border-bottom:2px solid var(--border);
    padding:12px 22px; position:sticky; top:0; z-index:50;
    box-shadow:var(--shadow-sm);
    display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap; gap:10px;
  }
  .tb-left { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .tb-title {
    font-family:'Montserrat',sans-serif; font-weight:900;
    font-size:1.15em; color:var(--text); letter-spacing:-0.5px;
    display:flex; align-items:center; gap:8px;
  }
  .live-pill {
    display:flex; align-items:center; gap:6px;
    background:var(--green-bg); border:1.5px solid var(--green-border);
    border-radius:50px; padding:4px 12px;
    font-size:0.72em; font-weight:700; color:var(--green);
  }
  .live-pill.off { background:#fdecea; border-color:#f5bcb8; color:var(--red); }
  .live-dot {
    width:8px; height:8px; border-radius:50%; background:var(--green);
    animation:livepulse 2s ease-in-out infinite;
  }
  .live-dot.off { background:var(--red); animation:none; }
  @keyframes livepulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

  .date-chip {
    font-size:0.75em; color:var(--text-dim); font-weight:700;
    background:var(--surface2); border:1.5px solid var(--border);
    border-radius:50px; padding:4px 12px;
  }

  .tb-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

  /* Controls */
  .ctrl-group {
    display:flex; align-items:center; gap:5px;
    background:var(--surface2); border:1.5px solid var(--border);
    border-radius:50px; padding:5px 12px;
  }
  .ctrl-lbl { font-size:0.7em; color:var(--text-dim); font-weight:700; white-space:nowrap; }
  .ctrl-btn {
    width:28px; height:28px; border-radius:50%;
    border:1.5px solid var(--border); background:var(--surface);
    color:var(--text-mid); font-size:1em; font-weight:900;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:all 0.13s; flex-shrink:0; line-height:1;
  }
  .ctrl-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-bg); }
  .ctrl-val { font-size:0.78em; font-weight:900; color:var(--text); min-width:36px; text-align:center; }

  .order-cnt {
    font-size:0.8em; color:var(--text-dim); font-weight:700; white-space:nowrap;
    background:var(--surface2); border:1.5px solid var(--border);
    border-radius:50px; padding:5px 14px;
  }
  .order-cnt strong { color:var(--accent); font-size:1.15em; }

  .btn-mute {
    padding:6px 16px; border-radius:50px;
    border:1.5px solid var(--border); background:var(--surface2);
    color:var(--text-mid); font-size:0.78em; font-weight:700;
    font-family:'Noto Sans KR',sans-serif; cursor:pointer; transition:all 0.13s; white-space:nowrap;
  }
  .btn-mute:hover { border-color:var(--accent); color:var(--accent); }
  .btn-mute.muted { border-color:var(--red); color:var(--red); background:#fdecea; }

  /* ── Grid ── */
  .main { flex:1; padding:22px 22px 100px; }
  .order-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(min(320px,100%), 1fr));
    gap:18px;
  }

  /* ── Card ── */
  .order-card {
    background:var(--surface); border:2px solid var(--border);
    border-radius:var(--radius); padding:22px 20px 20px;
    position:relative; overflow:hidden;
    box-shadow:var(--shadow-sm);
    transition:transform 0.2s, box-shadow 0.2s;
  }
  .order-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-md); }
  .order-card.is-new {
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(201,125,16,0.2), var(--shadow-lg);
    animation:cardPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes cardPop {
    from{opacity:0;transform:scale(0.85) translateY(20px)}
    to{opacity:1;transform:scale(1) translateY(0)}
  }

  .card-stripe {
    position:absolute; left:0; top:0; bottom:0; width:6px;
    background:linear-gradient(180deg, var(--accent), var(--accent-dark));
    border-radius:var(--radius) 0 0 var(--radius);
  }
  .card-body { padding-left:14px; }

  .new-badge {
    position:absolute; top:14px; right:14px;
    font-family:'Montserrat',sans-serif; font-weight:900;
    font-size:0.62em; color:#fff;
    background:var(--accent); border-radius:6px;
    padding:3px 10px; letter-spacing:1px;
    box-shadow:0 2px 8px rgba(201,125,16,0.4);
  }

  .card-num {
    font-family:'Montserrat',sans-serif; font-weight:900;
    font-size:0.82em; color:var(--text-dim); letter-spacing:1px;
    margin-bottom:14px; display:flex; align-items:center; gap:10px;
  }
  .card-num time {
    font-family:'Noto Sans KR',sans-serif;
    font-weight:400; font-size:0.9em; color:var(--text-dim);
  }

  .field { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .fl {
    font-size:0.68em; font-weight:700; color:var(--text-dim);
    letter-spacing:0.5px; min-width:52px; flex-shrink:0;
  }
  .fv { font-weight:900; font-size:1.05em; line-height:1.3; border-radius:6px; padding:4px 12px; }
  .fv.part  { color:var(--blue);  background:var(--blue-bg);  border:2px solid var(--blue-border); }
  .fv.store { color:var(--green); background:var(--green-bg); border:2px solid var(--green-border); }

  .prod-list {
    margin-top:14px; padding-top:14px;
    border-top:2px solid var(--surface2);
    display:flex; flex-direction:column; gap:7px;
  }
  .prod-row {
    display:flex; align-items:center; gap:10px;
    font-size:1em; font-weight:900; color:var(--text);
    background:var(--surface2); border-radius:8px;
    padding:8px 14px; border-left:5px solid var(--accent);
    letter-spacing:0.3px;
  }

  /* ── Flash ── */
  .flash {
    position:fixed; inset:0; pointer-events:none; z-index:200;
    border:6px solid var(--accent); opacity:0;
  }
  .flash.go { animation:flashAnim 1.5s ease-out forwards; }
  @keyframes flashAnim { 0%{opacity:1} 60%{opacity:0.6} 100%{opacity:0} }

  /* ── TTS Bar ── */
  .tts-bar {
    position:fixed; bottom:0; left:0; right:0;
    background:var(--accent); color:#fff;
    padding:16px 28px;
    font-family:'Montserrat',sans-serif; font-weight:900;
    font-size:1.05em; letter-spacing:0.5px;
    display:flex; align-items:center; gap:14px;
    transform:translateY(100%);
    transition:transform 0.4s cubic-bezier(0.34,1.2,0.64,1);
    z-index:100; box-shadow:0 -4px 24px rgba(201,125,16,0.35);
  }
  .tts-bar.show { transform:translateY(0); }
  .tts-ico { font-size:1.4em; animation:speakBob 0.5s ease infinite alternate; }
  @keyframes speakBob { from{transform:scale(1)} to{transform:scale(1.18)} }

  /* ── Empty ── */
  .empty {
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; flex:1; padding:80px 0; gap:16px;
  }
  .empty-ico { font-size:5em; opacity:0.12; }
  .empty-txt { color:var(--text-dim); font-size:0.95em; font-weight:700; }
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<!-- Config -->
<div class="cfg-wrap">
  <details class="cfg-panel" id="cfgPanel">
    <summary>Firebase 설정 (처음 한 번만)</summary>
    <div style="margin-top:8px;font-size:0.8rem;line-height:1.9;">
      입력 창과 <b>동일한 Firebase URL</b>을 입력하면 실시간으로 주문을 수신합니다.
    </div>
    <div class="cfg-fields">
      <input id="fbUrl" type="text" placeholder="https://bread-ord-default-rtdb.asia-southeast1.firebasedatabase.app" />
      <button class="btn-cfg" onclick="saveConfig()">연결</button>
      <div class="cfg-st" id="cfgSt"></div>
    </div>
  </details>
</div>

<div class="auto-del-bar" id="autoDelBar">
  🗑️ <span id="autoDelMsg"></span>
</div>

<!-- Top Bar -->
<div class="topbar">
  <div class="tb-left">
    <div class="tb-title">🥖 빵 추가 알림</div>
    <div class="live-pill" id="livePill">
      <div class="live-dot" id="liveDot"></div>
      <span id="liveLabel">연결 중...</span>
    </div>
    <div class="date-chip" id="dateChip"></div>
  </div>
  <div class="tb-right">
    <div class="ctrl-group">
      <span class="ctrl-lbl">글자</span>
      <button class="ctrl-btn" onclick="changeFont(-1)">－</button>
      <span class="ctrl-val" id="fontVal">100%</span>
      <button class="ctrl-btn" onclick="changeFont(1)">＋</button>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-lbl">🔊 볼륨</span>
      <button class="ctrl-btn" onclick="changeVol(-1)">－</button>
      <span class="ctrl-val" id="volVal">70%</span>
      <button class="ctrl-btn" onclick="changeVol(1)">＋</button>
    </div>
    <div class="order-cnt">총 <strong id="totalCnt">0</strong>건</div>
    <button class="btn-mute" id="muteBtn" onclick="toggleMute()">🔊 소리 ON</button>
  </div>
</div>

<div class="main">
  <div class="order-grid" id="orderGrid" style="display:none;"></div>
  <div class="empty" id="emptyState">
    <div class="empty-ico">🥐</div>
    <div class="empty-txt">주문 입력 창에서 주문을 추가하면 여기에 표시됩니다</div>
  </div>
</div>

<div class="tts-bar" id="ttsBar">
  <span class="tts-ico">🔔</span>
  <span id="ttsTxt"></span>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue, remove, get }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  function todayStr() {
    return new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'})
      .replace(/\. /g,'-').replace('.','');
  }
  function todayStart() { const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); }
  document.getElementById('dateChip').textContent = '📅 ' + todayStr();

  let db=null, isMuted=false, volStep=7, volume=0.7, fontPx=17;
  let knownIds=new Set(), speakQ=[], speaking=false;

  window.changeFont = dir => {
    fontPx = Math.min(40, Math.max(12, fontPx + dir*2));
    document.body.style.fontSize = fontPx+'px';
    document.getElementById('fontVal').textContent = Math.round(fontPx/17*100)+'%';
  };

  window.changeVol = dir => {
    volStep = Math.min(10, Math.max(0, volStep+dir));
    volume = volStep/10;
    document.getElementById('volVal').textContent = (volStep*10)+'%';
    playBeep(true);
  };

  window.toggleMute = () => {
    isMuted = !isMuted;
    const btn = document.getElementById('muteBtn');
    btn.textContent = isMuted ? '🔇 소리 OFF' : '🔊 소리 ON';
    btn.classList.toggle('muted', isMuted);
  };

  let audioCtx=null;
  function getCtx() { if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

  function playBeep(preview=false) {
    if(isMuted&&!preview) return;
    if(volStep===0) return;
    try {
      const ctx=getCtx();
      const notes=preview?[880]:[880,1100,1320];
      notes.forEach((freq,i)=>{
        const osc=ctx.createOscillator(), gain=ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value=freq; osc.type='sine';
        const t=ctx.currentTime+i*0.13;
        gain.gain.setValueAtTime(0,t);
        gain.gain.linearRampToValueAtTime(volume*0.45,t+0.03);
        gain.gain.exponentialRampToValueAtTime(0.001,t+0.3);
        osc.start(t); osc.stop(t+0.32);
      });
    } catch(e){}
  }

  function enqueue(text){ speakQ.push(text); if(!speaking) processQ(); }
  function processQ(){
    if(!speakQ.length){ speaking=false; return; }
    if(isMuted||volStep===0){ speakQ.length=0; return; }
    speaking=true;
    const text=speakQ.shift();
    showTTSBar(text);
    if('speechSynthesis' in window){
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text);
      u.lang='ko-KR'; u.rate=0.88; u.pitch=1.05; u.volume=Math.min(1,volume*1.5);
      u.onend=u.onerror=()=>setTimeout(processQ,400);
      window.speechSynthesis.speak(u);
    } else { setTimeout(processQ,2200); }
  }
  function showTTSBar(text){
    const bar=document.getElementById('ttsBar');
    document.getElementById('ttsTxt').textContent=text;
    bar.classList.add('show');
    setTimeout(()=>bar.classList.remove('show'),5000);
  }

  function doFlash(){
    const el=document.getElementById('flash');
    el.classList.remove('go'); void el.offsetWidth; el.classList.add('go');
  }

  function setLive(ok){
    document.getElementById('liveDot').className='live-dot'+(ok?'':' off');
    document.getElementById('livePill').className='live-pill'+(ok?'':' off');
    document.getElementById('liveLabel').textContent=ok?'LIVE':'오프라인';
  }

  const savedUrl=localStorage.getItem('fbUrl_bread');
  if(savedUrl){ document.getElementById('fbUrl').value=savedUrl; initFB(savedUrl); }
  else { document.getElementById('cfgPanel').open=true; setLive(false); }

  window.saveConfig=()=>{
    const url=document.getElementById('fbUrl').value.trim();
    if(!url) return;
    localStorage.setItem('fbUrl_bread',url);
    initFB(url);
  };

  function initFB(url){
    try{
      const app=initializeApp({databaseURL:url},'bread-disp');
      db=getDatabase(app);
      setLive(true);
      document.getElementById('cfgSt').textContent='✅ 연결 성공!';
      document.getElementById('cfgSt').className='cfg-st ok';
      document.getElementById('cfgPanel').open=false;
      autoDeleteOldData();
      listenOrders();
    } catch(e){
      setLive(false);
      document.getElementById('cfgSt').textContent='❌ '+e.message;
      document.getElementById('cfgSt').className='cfg-st err';
    }
  }

  async function autoDeleteOldData(){
    const todayTs=todayStart();
    try{
      const ordersRef=ref(db,'breadOrders');
      const snap=await get(ordersRef);
      if(!snap.exists()) return;
      const oldKeys=[];
      snap.forEach(child=>{ if((child.val().ts||0)<todayTs) oldKeys.push(child.key); });
      if(oldKeys.length>0){
        for(const key of oldKeys) await remove(ref(db,'breadOrders/'+key));
        const bar=document.getElementById('autoDelBar');
        document.getElementById('autoDelMsg').textContent=
          `전날 주문 ${oldKeys.length}건이 자동 삭제되었습니다. (오늘: ${todayStr()})`;
        bar.classList.add('show');
        setTimeout(()=>bar.classList.remove('show'),6000);
      }
    } catch(e){ console.warn('자동삭제 오류:',e); }
  }

  function listenOrders(){
    const ordersRef=ref(db,'breadOrders');
    onValue(ordersRef,snap=>{
      const orders=[];
      if(snap.exists()){
        snap.forEach(c=>orders.push({fk:c.key,...c.val()}));
        orders.sort((a,b)=>(a.ts||0)-(b.ts||0));
        orders.forEach((o,i)=>o.num=i+1);
      }
      const currentIds=new Set(orders.map(o=>o.fk));
      const newIds=new Set([...currentIds].filter(id=>!knownIds.has(id)));

      renderOrders(orders,newIds);
      document.getElementById('totalCnt').textContent=orders.length;

      if(newIds.size>0){
        doFlash(); playBeep();
        orders.filter(o=>newIds.has(o.fk)).forEach(o=>{
          const lines=o.products.split('\n').filter(l=>l.trim());
          enqueue(`주문 ${o.num}. ${o.part}, ${o.store} 매장. ${lines.join(', ')}.`);
        });
      }
      knownIds=currentIds;
    });
  }

  function renderOrders(orders,newIds){
    const grid=document.getElementById('orderGrid');
    const empty=document.getElementById('emptyState');
    if(!orders.length){ grid.style.display='none'; empty.style.display='flex'; return; }
    empty.style.display='none'; grid.style.display='grid';

    grid.innerHTML=[...orders].reverse().map(o=>{
      const isNew=newIds&&newIds.has(o.fk);
      const prods=o.products.split('\n').filter(l=>l.trim())
        .map(l=>`<div class="prod-row">${l.trim()}</div>`).join('');
      return `
        <div class="order-card ${isNew?'is-new':''}" id="oc-${o.fk}">
          ${isNew?'<div class="new-badge">NEW</div>':''}
          <div class="card-stripe"></div>
          <div class="card-body">
            <div class="card-num">주문 ${o.num} <time>${o.time}</time></div>
            <div class="field"><span class="fl">추가파트</span><span class="fv part">${o.part}</span></div>
            <div class="field"><span class="fl">추가매장</span><span class="fv store">${o.store}</span></div>
            <div class="prod-list">${prods}</div>
          </div>
        </div>`;
    }).join('');

    if(newIds&&newIds.size){
      setTimeout(()=>newIds.forEach(id=>{
        const el=document.getElementById('oc-'+id);
        if(el) el.classList.remove('is-new');
      }),5000);
    }
  }

  document.addEventListener('click',()=>{ try{getCtx();}catch(e){} },{once:true});
</script>
</body>
</html>
