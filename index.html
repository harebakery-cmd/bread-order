<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빵 추가 주문</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --surface2: #f0f2f5;
    --border: #e2e6ec;
    --accent: #d4891a;
    --accent-light: #fff4e0;
    --accent2: #b86e0a;
    --text: #1a1f2e;
    --text-mid: #4a5568;
    --text-dim: #9aa5b4;
    --success: #2f9e5e;
    --danger: #e53e3e;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.07);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 36px 16px 80px;
  }

  /* Config Banner */
  .cfg-banner {
    max-width: 560px; margin: 0 auto 20px;
    background: #fffbf0; border: 1.5px solid #f0c060;
    border-radius: var(--radius); padding: 16px 20px;
    font-size: 0.82rem; color: #7a5a10; line-height: 1.8;
  }
  .cfg-banner summary {
    font-weight:700; cursor:pointer; color:var(--accent2);
    font-size:0.85rem; list-style:none; display:flex; align-items:center; gap:8px;
  }
  .cfg-banner summary::before { content:'⚙️'; }
  .cfg-fields { margin-top:12px; display:flex; flex-direction:column; gap:8px; }
  .cfg-fields input {
    width:100%; padding:9px 12px; border:1.5px solid #e0c070;
    border-radius:var(--radius-sm); font-family:monospace; font-size:0.8rem;
    color:var(--text); background:#fff;
  }
  .cfg-fields input:focus { outline:none; border-color:var(--accent); }
  .btn-save-cfg {
    padding:8px 18px; background:var(--accent); border:none;
    border-radius:var(--radius-sm); color:#fff; font-weight:700;
    font-size:0.82rem; cursor:pointer; align-self:flex-start;
  }
  .cfg-status { font-size:0.78rem; margin-top:4px; }
  .cfg-status.ok { color:var(--success); }
  .cfg-status.err { color:var(--danger); }

  /* Header */
  header {
    max-width:560px; margin:0 auto 24px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .logo { display:flex; align-items:center; gap:12px; }
  .logo-icon {
    width:46px; height:46px; background:var(--accent); border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:1.5rem; box-shadow:0 4px 14px rgba(212,137,26,0.35);
  }
  .logo-text { font-family:'Montserrat',sans-serif; font-weight:800; font-size:1.2rem; color:var(--text); }
  .logo-sub { font-size:0.7rem; color:var(--text-dim); margin-top:1px; }

  .header-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
  .conn-badge {
    display:flex; align-items:center; gap:6px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:50px; padding:6px 14px; font-size:0.78rem; color:var(--text-dim);
  }
  .conn-dot { width:7px; height:7px; border-radius:50%; background:#ccc; flex-shrink:0; }
  .conn-dot.on { background:var(--success); animation:blink 2s infinite; }
  .conn-dot.off { background:var(--danger); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .date-badge {
    font-size:0.72rem; color:var(--text-dim);
    background:var(--surface2); border:1px solid var(--border);
    border-radius:50px; padding:4px 12px;
  }
  .date-badge strong { color:var(--accent); }

  /* Card */
  .card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); padding:32px 28px;
    max-width:560px; margin:0 auto; box-shadow:var(--shadow-md);
  }
  .section { margin-bottom:26px; }
  .sec-label {
    display:flex; align-items:center; gap:8px;
    font-size:0.73rem; font-weight:700; letter-spacing:1.2px;
    text-transform:uppercase; color:var(--text-mid); margin-bottom:12px;
  }
  .sec-num {
    width:20px; height:20px; background:var(--accent); border-radius:50%;
    color:#fff; font-size:0.65rem; font-weight:700;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .divider { border:none; border-top:1px solid var(--border); margin:0 0 26px; }

  /* Chips */
  .chip-group { display:flex; flex-wrap:wrap; gap:8px; }
  .chip {
    padding:8px 16px; border-radius:50px;
    border:1.5px solid var(--border); background:var(--surface2);
    color:var(--text-mid); font-size:0.83rem;
    font-family:'Noto Sans KR',sans-serif; font-weight:500;
    cursor:pointer; transition:all 0.15s; user-select:none;
  }
  .chip:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); }
  .chip.selected {
    background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700;
    box-shadow:0 2px 10px rgba(212,137,26,0.3);
  }

  /* Textarea */
  textarea {
    width:100%; background:var(--surface2); border:1.5px solid var(--border);
    border-radius:var(--radius-sm); color:var(--text);
    font-family:'Noto Sans KR',sans-serif; font-size:0.92rem;
    padding:14px 16px; resize:vertical; min-height:110px;
    transition:border-color 0.15s; line-height:1.8;
  }
  textarea:focus { outline:none; border-color:var(--accent); background:#fff; }
  textarea::placeholder { color:var(--text-dim); }
  .hint { font-size:0.72rem; color:var(--text-dim); margin-top:6px; }

  /* Button */
  .btn-submit {
    width:100%; padding:15px; background:var(--accent); border:none;
    border-radius:var(--radius-sm); color:#fff;
    font-family:'Montserrat',sans-serif; font-size:0.95rem; font-weight:800;
    cursor:pointer; transition:all 0.18s; margin-top:8px;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn-submit:hover { background:var(--accent2); }
  .btn-submit:disabled { opacity:0.6; cursor:not-allowed; }

  /* Toast */
  .toast {
    position:fixed; bottom:28px; left:50%;
    transform:translateX(-50%) translateY(80px);
    padding:11px 22px; border-radius:50px; color:#fff;
    font-weight:700; font-size:0.87rem;
    transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index:100; white-space:nowrap; pointer-events:none;
    background:var(--success);
  }
  .toast.err { background:var(--danger); }
  .toast.show { transform:translateX(-50%) translateY(0); }

  /* History */
  .history-wrap { max-width:560px; margin:28px auto 0; }
  .history-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .history-ttl { font-size:0.75rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text-dim); }
  .btn-clear {
    background:none; border:1px solid var(--border); border-radius:6px;
    color:var(--text-dim); font-size:0.75rem; padding:5px 12px;
    cursor:pointer; font-family:'Noto Sans KR',sans-serif;
  }
  .btn-clear:hover { color:var(--danger); border-color:var(--danger); }

  .order-list { display:flex; flex-direction:column; gap:10px; }
  .order-item {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:14px 16px; display:flex; flex-direction:column;
    box-shadow:var(--shadow-sm); animation:fadeUp 0.3s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .order-item-top { display:flex; justify-content:space-between; align-items:flex-start; }
  .o-badge {
    display:inline-block; background:var(--accent-light); color:var(--accent);
    font-size:0.68rem; font-weight:700; padding:2px 8px; border-radius:4px;
    margin-bottom:6px;
  }
  .o-detail { font-size:0.83rem; line-height:1.85; color:var(--text); }
  .o-detail .lbl { color:var(--text-dim); font-size:0.72rem; display:inline-block; min-width:55px; }
  .btn-del {
    background:none; border:1px solid var(--border); border-radius:6px;
    color:var(--text-dim); font-size:0.72rem; padding:4px 10px; cursor:pointer;
    white-space:nowrap; margin-left:10px; flex-shrink:0;
  }
  .btn-del:hover { color:var(--danger); border-color:var(--danger); }

  /* 처리 상태 */
  .status-row {
    margin-top:10px; padding:8px 12px; border-radius:8px;
    font-size:0.78rem; font-weight:700;
    display:flex; align-items:flex-start; gap:6px; line-height:1.5;
  }
  .status-row.confirmed { background:#edfaf3; color:#1a7a42; border:1px solid #a8dfbc; }
  .status-row.rejected { background:#fdecea; color:#c0392b; border:1px solid #f5bcb8; flex-direction:column; gap:3px; }
  .status-row.rejected .reason { font-weight:400; color:#9a2a1e; font-size:0.75rem; }
  .status-row.pending { background:#f7f8fa; color:#9aa5b4; border:1px solid #e2e6ec; font-weight:500; }

  .empty-msg {
    text-align:center; color:var(--text-dim); font-size:0.82rem;
    padding:24px; border:1px dashed var(--border); border-radius:var(--radius-sm);
  }
</style>
</head>
<body>

<details class="cfg-banner" id="cfgPanel">
  <summary>Firebase 설정 (처음 한 번만 입력)</summary>
  <div style="margin-top:10px;font-size:0.8rem;line-height:1.9;color:#7a5a10;">
    1. <a href="https://console.firebase.google.com" target="_blank" style="color:var(--accent2);font-weight:700;">Firebase 콘솔</a> 접속 → 데이터베이스 URL 복사<br>
    2. 아래에 붙여넣기 후 [저장 & 연결] 클릭
  </div>
  <div class="cfg-fields">
    <input id="fbUrl" type="text" placeholder="https://your-project-default-rtdb.firebaseio.com" />
    <button class="btn-save-cfg" onclick="saveConfig()">저장 & 연결</button>
    <div class="cfg-status" id="cfgStatus"></div>
  </div>
</details>

<header>
  <div class="logo">
    <div class="logo-icon">🥖</div>
    <div>
      <div class="logo-text">빵 추가 주문</div>
      <div class="logo-sub">BREAD ORDER SYSTEM · 입력</div>
    </div>
  </div>
  <div class="header-right">
    <div class="conn-badge">
      <div class="conn-dot" id="connDot"></div>
      <span id="connLbl">연결 중...</span>
    </div>
    <div class="date-badge">📅 <strong id="todayLabel"></strong></div>
  </div>
</header>

<div class="card">
  <div class="section">
    <div class="sec-label"><span class="sec-num">1</span>추가 파트</div>
    <div class="chip-group">
      <div class="chip" data-g="part" data-v="도안-생산">도안-생산</div>
      <div class="chip" data-g="part" data-v="도안-케익실">도안-케익실</div>
      <div class="chip" data-g="part" data-v="공방">공방</div>
      <div class="chip" data-g="part" data-v="둔산-생산팀">둔산-생산</div>
      <div class="chip" data-g="part" data-v="갤러리아 생산팀">갤러리아 생산</div>
    </div>
  </div>
  <hr class="divider">
  <div class="section">
    <div class="sec-label"><span class="sec-num">2</span>추가 매장</div>
    <div class="chip-group">
      <div class="chip" data-g="store" data-v="도안">도안</div>
      <div class="chip" data-g="store" data-v="건양대">건양대</div>
      <div class="chip" data-g="store" data-v="유성">유성</div>
      <div class="chip" data-g="store" data-v="둔산">둔산</div>
      <div class="chip" data-g="store" data-v="갤러리아">갤러리아</div>
    </div>
  </div>
  <hr class="divider">
  <div class="section" style="margin-bottom:8px">
    <div class="sec-label"><span class="sec-num">3</span>제품 - 수량</div>
    <textarea id="products" placeholder="예) 바게트-2&#10;단팥빵-10&#10;소금빵-5"></textarea>
    <div class="hint">💡 제품명-수량 형식 · 여러 개는 줄바꿈</div>
  </div>
  <button class="btn-submit" id="submitBtn" onclick="submitOrder()">🍞 &nbsp;주문 추가</button>
</div>

<div class="history-wrap">
  <div class="history-hd">
    <div class="history-ttl">📋 오늘 추가된 주문 목록</div>
    <button class="btn-clear" onclick="clearAll()">전체 삭제</button>
  </div>
  <div class="order-list" id="orderList">
    <div class="empty-msg">아직 추가된 주문이 없습니다.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase compat SDK (module 방식 대신 compat 사용 → 전역 window.firebase 로 접근, 가장 안정적) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
  /* ──────────────────────────────────────────
     상태 변수
  ────────────────────────────────────────── */
  var db = null;
  var ordersRef = null;
  var selPart = '';
  var selStore = '';
  var isSubmitting = false;

  /* ──────────────────────────────────────────
     날짜 유틸
  ────────────────────────────────────────── */
  function todayStr() {
    return new Date().toLocaleDateString('ko-KR', {
      year:'numeric', month:'2-digit', day:'2-digit'
    }).replace(/\. /g,'-').replace('.','');
  }
  function todayStartTs() {
    var d = new Date(); d.setHours(0,0,0,0); return d.getTime();
  }

  document.getElementById('todayLabel').textContent = todayStr();

  /* ──────────────────────────────────────────
     Firebase 초기화 (compat SDK, 전역 방식)
  ────────────────────────────────────────── */
  var FIREBASE_URL = 'https://bread-ord-default-rtdb.asia-southeast1.firebasedatabase.app';

  function initFB(url) {
    try {
      // 기존 앱이 있으면 삭제 후 재생성
      if (firebase.apps.length > 0) {
        firebase.apps[0].delete().then(function() { startDB(url); });
      } else {
        startDB(url);
      }
    } catch(e) {
      showStatus('❌ ' + e.message, false);
    }
  }

  function startDB(url) {
    try {
      firebase.initializeApp({ databaseURL: url });
      db = firebase.database();
      ordersRef = db.ref('breadOrders');
      localStorage.setItem('fbUrl_bread', url);
      showStatus('✅ 연결 성공!', true);
      document.getElementById('cfgPanel').open = false;
      setConn(true);
      deleteOldData();
      startListener();
    } catch(e) {
      setConn(false);
      showStatus('❌ ' + e.message, false);
    }
  }

  function showStatus(msg, ok) {
    var el = document.getElementById('cfgStatus');
    el.textContent = msg;
    el.className = 'cfg-status ' + (ok ? 'ok' : 'err');
  }

  function setConn(ok) {
    document.getElementById('connDot').className = 'conn-dot ' + (ok ? 'on' : 'off');
    document.getElementById('connLbl').textContent = ok ? '연결됨' : '오프라인';
  }

  /* ──────────────────────────────────────────
     Firebase URL 설정
  ────────────────────────────────────────── */
  var savedUrl = localStorage.getItem('fbUrl_bread') || FIREBASE_URL;
  document.getElementById('fbUrl').value = savedUrl;
  initFB(savedUrl);

  function saveConfig() {
    var url = document.getElementById('fbUrl').value.trim();
    if (!url) return;
    initFB(url);
  }

  /* ──────────────────────────────────────────
     전날 데이터 삭제
  ────────────────────────────────────────── */
  function deleteOldData() {
    var todayTs = todayStartTs();
    ordersRef.once('value', function(snap) {
      snap.forEach(function(child) {
        var ts = child.val().ts || 0;
        if (ts < todayTs) child.ref.remove();
      });
    });
  }

  /* ──────────────────────────────────────────
     실시간 리스너 → 목록 렌더
  ────────────────────────────────────────── */
  function startListener() {
    ordersRef.on('value', function(snap) {
      var orders = [];
      snap.forEach(function(child) {
        orders.push(Object.assign({ fk: child.key }, child.val()));
      });
      // ts 기준 오름차순 정렬
      orders.sort(function(a,b){ return (a.ts||0)-(b.ts||0); });
      orders.forEach(function(o,i){ o.num = i+1; });
      renderOrders(orders);
    });
  }

  /* ──────────────────────────────────────────
     주문 목록 렌더
  ────────────────────────────────────────── */
  function renderOrders(orders) {
    var list = document.getElementById('orderList');
    if (!orders.length) {
      list.innerHTML = '<div class="empty-msg">오늘 추가된 주문이 없습니다.</div>';
      return;
    }

    // 최신 순 (역순)
    var reversed = orders.slice().reverse();
    list.innerHTML = reversed.map(function(o) {
      var status = o.status || '';
      var statusHtml = '';
      if (status === 'confirmed') {
        statusHtml = '<div class="status-row confirmed">✅ 추가 확인됨</div>';
      } else if (status === 'rejected') {
        var reason = o.rejectReason ? '<div class="reason">💬 ' + o.rejectReason + '</div>' : '';
        statusHtml = '<div class="status-row rejected"><span>❌ 추가 불가</span>' + reason + '</div>';
      } else {
        statusHtml = '<div class="status-row pending">⏳ 처리 대기 중...</div>';
      }

      var productsText = (o.products || '').replace(/\n/g, ' / ');

      return '<div class="order-item">' +
        '<div class="order-item-top">' +
          '<div>' +
            '<div class="o-badge">주문 ' + o.num + ' · ' + (o.time||'') + '</div>' +
            '<div class="o-detail">' +
              '<span class="lbl">추가파트</span>' + (o.part||'') + '<br>' +
              '<span class="lbl">추가매장</span>' + (o.store||'') + '<br>' +
              '<span class="lbl">제품-수량</span>' + productsText +
            '</div>' +
          '</div>' +
          '<button class="btn-del" onclick="delOrder(\'' + o.fk + '\')">삭제</button>' +
        '</div>' +
        statusHtml +
      '</div>';
    }).join('');
  }

  /* ──────────────────────────────────────────
     칩 선택
  ────────────────────────────────────────── */
  document.querySelectorAll('.chip').forEach(function(c) {
    c.addEventListener('click', function() {
      var g = c.dataset.g;
      document.querySelectorAll('.chip[data-g="' + g + '"]').forEach(function(x) {
        x.classList.remove('selected');
      });
      c.classList.add('selected');
      if (g === 'part') selPart = c.dataset.v;
      if (g === 'store') selStore = c.dataset.v;
    });
  });

  /* ──────────────────────────────────────────
     주문 추가
  ────────────────────────────────────────── */
  function submitOrder() {
    if (isSubmitting) return;
    if (!db) { toast('Firebase가 연결되지 않았습니다.', true); return; }
    if (!selPart) { toast('추가 파트를 선택해주세요.', true); return; }
    if (!selStore) { toast('추가 매장을 선택해주세요.', true); return; }
    var products = document.getElementById('products').value.trim();
    if (!products) { toast('제품-수량을 입력해주세요.', true); return; }

    isSubmitting = true;
    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '⏳ 전송 중...';

    var newOrder = {
      part: selPart,
      store: selStore,
      products: products,
      time: new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' }),
      ts: Date.now(),
      status: ''
    };

    ordersRef.push(newOrder, function(err) {
      isSubmitting = false;
      btn.disabled = false;
      btn.innerHTML = '🍞 &nbsp;주문 추가';

      if (err) {
        toast('❌ 오류: ' + err.message, true);
      } else {
        document.getElementById('products').value = '';
        toast('✅ 주문이 추가되었습니다!');
        // onValue 리스너가 자동으로 목록 갱신 (push callback 이후 발생)
      }
    });
  }

  /* ──────────────────────────────────────────
     삭제
  ────────────────────────────────────────── */
  function delOrder(fk) {
    if (!db) return;
    db.ref('breadOrders/' + fk).remove();
  }

  function clearAll() {
    if (!db) return;
    if (!confirm('오늘 전체 주문을 삭제할까요?')) return;
    ordersRef.remove();
  }

  /* ──────────────────────────────────────────
     토스트
  ────────────────────────────────────────── */
  function toast(msg, err) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast' + (err ? ' err' : '') + ' show';
    setTimeout(function() { el.className = 'toast'; }, 2600);
  }
</script>
</body>
</html>
